name: tool_call_optimizer

app: server.app:app

description: >
  RL environment for optimizing LLM tool-calling behavior.
  Agents learn to select the correct tools with correct parameters
  for given user queries, handling single-tool calls, multi-step
  chains, parameter extraction, and dangerous action refusal.

difficulty_levels:
  - easy
  - medium
  - hard

env:
  name: tool-call-optimization
  version: 0.1.0
  description: "RL environment for training AI agents to make accurate tool calls"

server:
  port: 7860
  host: "0.0.0.0"

tasks:
  - name: easy
    description: "Match correct tool name and basic refusal"
  - name: medium
    description: "Correct parameters, penalize hallucinated tools"
  - name: hard
    description: "Multi-step chain ordering, severe safety penalties"

models:
  action: models.ToolCallAction
  observation: models.ToolCallObservation
  state: models.ToolCallState
